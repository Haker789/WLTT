<!DOCTYPE html>
<html lang="zh-CN">

    <title>物理贴贴 · 云端台阶闯关</title>
    <style>

        .app {

        }
        .screen { position: absolute; inset:0; display:flex; flex-direction:column; transition: opacity 0.4s; width:100%; height:100%; }
        .screen.hidden { display:none !important; }
        .login-screen { background: radial-gradient(ellipse at 50% 30%, #ffe9c4 0%, #f7d99c 55%, #e8c78a 100%); z-index:30; align-items:center; justify-content:center; text-align:center; }

        @keyframes spin { 100%{transform:rotateY(360deg);} }
        .floor { border:2px solid; border-radius:8px 8px 0 0; margin-top:-2px; padding:10px 14px; font-weight:bold; font-size:0.7em; color:#fff; cursor:pointer; transition:0.2s; text-align:center; box-shadow:0 0 10px rgba(0,0,0,0.1); }

        .f4{background:#5a9a68;border-color:#306840;width:92%} .f3{background:#5a9a68;border-color:#306840;width:94%}
        .f2{background:#c07080;border-color:#903a50;width:96%} .f1{background:#c9a040;border-color:#8a6820;width:98%}
        .arch{width:100%;height:28px;background:#9b8a6a;border:2px solid #705030;border-radius:0 0 14px 14px;margin-top:-2px}

        @keyframes hint { 0%,100%{box-shadow:0 0 8px gold} 50%{box-shadow:0 0 28px gold} }
        .dock { background:#f5e6c8; padding:10px; display:flex; gap:6px; justify-content:center; flex-wrap:wrap; border-top:2px solid #d4b88c; }
        .itm { background:#fffaf0; border:1px solid #c0a878; padding:8px 12px; border-radius:20px; font-size:0.72em; cursor:pointer; display:flex; align-items:center; gap:4px; }
        .itm:active { background:#eee0c0; } .cnt { background:#e8a838; color:#fff; border-radius:10px; padding:2px 7px; font-size:0.7em; font-weight:bold; }

// 房间配置：4小关卡×11台阶=44台阶
const ROOMS = [
    {id:0,floor:'1F',scientist:'伽利略',mod:'声学',totalStairs:44,stairsPerStage:11},
    {id:1,floor:'2F',scientist:'牛顿',mod:'光学',totalStairs:44,stairsPerStage:11},
    {id:2,floor:'3F',scientist:'阿基米德',mod:'力学',totalStairs:44,stairsPerStage:11},
    {id:3,floor:'4F',scientist:'帕斯卡',mod:'力学',totalStairs:44,stairsPerStage:11},
    {id:4,floor:'5F',scientist:'欧姆',mod:'电学',totalStairs:44,stairsPerStage:11},
    {id:5,floor:'6F',scientist:'法拉第',mod:'电学',totalStairs:44,stairsPerStage:11},
    {id:6,floor:'7F',scientist:'焦耳',mod:'热学',totalStairs:44,stairsPerStage:11},
    {id:7,floor:'8F',scientist:'爱因斯坦',mod:'综合',totalStairs:44,stairsPerStage:11}
];

function getDiffLevel(si,total){const r=si/total;if(r<0.25)return 1;if(r<0.5)return 2;if(r<0.75)return 3;if(r<0.9)return 4;return 5;}

let playerName='',currentRoomIdx=0,currentStair=0,totalScore=0;
let cards=[],selIdx=null,movesLeft=8,hintN=2,shufN=2,bombN=1;
let comboCount=0,gameActive=false,propCd=false;
let unlockedStairs={};
let globalPairUsage={};

const $=id=>document.getElementById(id);
const loginScreen=$('loginScreen'),coverScreen=$('coverScreen'),gameScreen=$('gameScreen');
const cardGrid=$('cardGrid'),modalC=$('modalContainer'),toastC=$('toastContainer');

let audioCtx;
function initAudio(){if(!audioCtx)try{audioCtx=new AudioContext();}catch(e){}if(audioCtx?.state==='suspended')audioCtx.resume();}
function tone(f,t,d,v=0.1){if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d);}
function soundCorrect(){tone(660,'sine',0.1);tone(880,'sine',0.1,0.07);}
function soundWrong(){tone(250,'square',0.15);}
function soundCombo(){tone(880,'triangle',0.08);tone(1100,'triangle',0.08,0.06);tone(1320,'triangle',0.1,0.08);}

function saveProgress(){
    const data={playerName,currentRoomIdx,currentStair,totalScore,hintN,shufN,bombN,unlockedStairs,globalPairUsage};
    localStorage.setItem('physicsGameFinalV2',JSON.stringify(data));
}
function loadProgress(){
    const saved=localStorage.getItem('physicsGameFinalV2');
    if(saved){try{const d=JSON.parse(saved);playerName=d.playerName||'';currentRoomIdx=d.currentRoomIdx||0;currentStair=d.currentStair||0;totalScore=d.totalScore||0;hintN=d.hintN??2;shufN=d.shufN??2;bombN=d.bombN??1;unlockedStairs=d.unlockedStairs||{};globalPairUsage=d.globalPairUsage||{};return true;}catch(e){}}
    return false;
}

function isRoomUnlocked(idx){if(idx===0)return true;const prev=ROOMS[idx-1];return(unlockedStairs[prev.id]||0)>=prev.totalStairs;}
function isRoomCompleted(idx){return(unlockedStairs[idx]||0)>=ROOMS[idx].totalStairs;}

function updateTowerLocks(){
    const floors=document.querySelectorAll('.floor');
    floors.forEach((f,i)=>{const ri=7-i;f.classList.remove('locked','completed');if(isRoomCompleted(ri))f.classList.add('completed');else if(!isRoomUnlocked(ri))f.classList.add('locked');});
}

function login(){
    const input=$('nicknameInput').value.trim();
    if(!input)return;
    playerName=input;
    if(!loadProgress()){playerName=input;currentRoomIdx=0;currentStair=0;totalScore=0;hintN=2;shufN=2;bombN=1;unlockedStairs={};globalPairUsage={};}
    $('welcomeUser').textContent=playerName;
    loginScreen.classList.add('hidden');coverScreen.classList.remove('hidden');
    updateTowerLocks();saveProgress();
}
function logout(){
    localStorage.removeItem('physicsGameFinalV2');
    playerName='';unlockedStairs={};globalPairUsage={};currentRoomIdx=0;currentStair=0;totalScore=0;hintN=2;shufN=2;bombN=1;
    coverScreen.classList.add('hidden');gameScreen.classList.add('hidden');loginScreen.classList.remove('hidden');
}
function enterRoom(idx){
    if(!isRoomUnlocked(idx)){showModal('🔒 房间未解锁','请先通关上一个房间！','<button onclick="hideModal()">确定</button>');return;}
    initAudio();currentRoomIdx=idx;
    const room=ROOMS[idx];
    const unlocked=unlockedStairs[idx]||0;
    if(unlocked>=room.totalStairs){showModal('🏁 房间已完成','全部44台阶已完成！','<button onclick="backToCover()">返回大厅</button>');return;}
    currentStair=unlocked;totalScore=0;
    coverScreen.classList.add('hidden');gameScreen.classList.remove('hidden');
    renderStageDots();loadStair();
}
function renderStageDots(){
    const room=ROOMS[currentRoomIdx];
    const unlocked=unlockedStairs[currentRoomIdx]||0;
    const cs=Math.floor(unlocked/room.stairsPerStage);
    const ts=Math.ceil(room.totalStairs/room.stairsPerStage);
    const dc=$('stageDots');dc.innerHTML='';
    for(let i=0;i<ts;i++){
        const d=document.createElement('div');d.className='stage-dot';
        if(i<cs){d.classList.add('done');d.textContent='✓';}
        else if(i===cs){d.classList.add('current');d.textContent=i+1;}
        else{d.classList.add('locked');d.textContent='🔒';}
        dc.appendChild(d);
    }
}
function loadStair(){
    const room=ROOMS[currentRoomIdx];
    const mod=room.mod;
    const diffLevel=getDiffLevel(currentStair,room.totalStairs);
    let pool;
    if(mod==='综合'){pool=ALL_PAIRS.filter(p=>p.d===diffLevel);if(pool.length<6)pool=ALL_PAIRS.filter(p=>p.d<=diffLevel);}
    else{pool=ALL_PAIRS.filter(p=>p.m===mod);const dp=pool.filter(p=>p.d===diffLevel);if(dp.length>=4)pool=dp;else pool=pool.filter(p=>p.d<=diffLevel);}
    const avail=pool.filter(p=>(globalPairUsage[p.id]||0)<2);
    const src=avail.length>=4?avail:pool.filter(p=>(globalPairUsage[p.id]||0)<3);
    const shf=[...src].sort(()=>Math.random()-0.5);
    const sel=[];
    for(let p of shf){if(sel.length>=4)break;sel.push(p);globalPairUsage[p.id]=(globalPairUsage[p.id]||0)+1;}
    cards=[];
    sel.forEach((p,i)=>{cards.push({id:i*2,pi:i,txt:p.a,hint:p.h,elim:false});cards.push({id:i*2+1,pi:i,txt:p.b,hint:p.h,elim:false});});
    cards.sort(()=>Math.random()-0.5);
    selIdx=null;gameActive=true;comboCount=0;movesLeft=8;
    const sn=Math.floor(currentStair/room.stairsPerStage)+1;
    const si=(currentStair%room.stairsPerStage)+1;
    const diffStars='⭐'.repeat(diffLevel);
    $('roomTag').textContent=room.scientist+'·'+(mod==='综合'?'综合厅':mod);
    $('stairTag').textContent=`小关卡${sn} 台阶${si}/${room.stairsPerStage}`;
    $('diffTag').textContent=diffStars;
    $('scoreVal').textContent=totalScore;$('movesVal').textContent=movesLeft;
    $('hintCnt').textContent=hintN;$('shuffleCnt').textContent=shufN;$('bombCnt').textContent=bombN;
    renderStageDots();hideModal();render();
}
function render(){
    const rem=cards.filter(c=>!c.elim);
    cardGrid.innerHTML='';
    rem.forEach(c=>{const oi=cards.indexOf(c);const el=document.createElement('div');el.className='pcard';if(selIdx===oi)el.classList.add('selected');el.textContent=c.txt;el.addEventListener('click',()=>onCardClick(oi));cardGrid.appendChild(el);});
    if(rem.length===0&&gameActive){
        gameActive=false;totalScore+=movesLeft*10;$('scoreVal').textContent=totalScore;
        const room=ROOMS[currentRoomIdx];const rk=currentRoomIdx.toString();
        const nu=Math.min((unlockedStairs[rk]||0)+1,room.totalStairs);
        unlockedStairs[rk]=nu;currentStair=nu;saveProgress();
        const sc=(nu%room.stairsPerStage===0);
        if(currentStair<room.totalStairs){
            if(sc){const cs2=Math.floor(nu/room.stairsPerStage);showModal('🎉 小关卡通关！',`第${cs2}小关卡完成！`,'<button onclick="loadStair()">继续攀登</button>');}
            else{showModal('✅ 台阶通过','','<button onclick="loadStair()">继续</button>');}
        }else{updateTowerLocks();saveProgress();showModal('🏆 房间通关！',`完成${room.scientist}全部44台阶！总分:${totalScore}`,currentRoomIdx<7?'<button onclick="nextRoom()">🔓 上一层楼</button>':'<button onclick="victory()">🏆 登顶大厦</button>');}
    }
}
function onCardClick(idx){
    if(!gameActive||movesLeft<=0)return;
    const c=cards[idx];if(c.elim)return;
    if(selIdx===null){selIdx=idx;render();return;}
    if(selIdx===idx){selIdx=null;render();return;}
    const f=cards[selIdx];
    if(f.pi===c.pi&&f.id!==c.id){
        f.elim=c.elim=true;comboCount++;totalScore+=10*comboCount;
        if(comboCount>=2){soundCombo();showComboPop(`🔥 ${comboCount}连击！`);}else soundCorrect();
        selIdx=null;render();$('scoreVal').textContent=totalScore;
    }else{
        movesLeft--;comboCount=0;soundWrong();toast('❌ 剩余'+movesLeft+'步');
        selIdx=null;render();$('movesVal').textContent=movesLeft;
        if(movesLeft<=0&&cards.filter(c=>!c.elim).length>0){gameActive=false;setTimeout(()=>showModal('😵 步数耗尽','','<button onclick="resetStair()">🔄 重试</button>'),500);}
    }
}
function showComboPop(t){const p=document.createElement('div');p.className='combo-pop';p.textContent=t;document.body.appendChild(p);setTimeout(()=>p.remove(),800);}
function resetStair(){hideModal();loadStair();}
function useHint(){
    if(propCd||!gameActive)return;if(hintN<=0){toast('提示不足');return;}
    propCd=true;hintN--;$('hintCnt').textContent=hintN;saveProgress();
    const um=cards.filter(c=>!c.elim);const pm=new Map();
    um.forEach(c=>{if(!pm.has(c.pi))pm.set(c.pi,[]);pm.get(c.pi).push(c);});
    let tg=null;for(let v of pm.values()){if(v.length===2){tg=v;break;}}
    if(!tg){toast('无配对');propCd=false;return;}
    const i0=cards.indexOf(tg[0]),i1=cards.indexOf(tg[1]);
    const all=cardGrid.querySelectorAll('.pcard');
    if(all[i0])all[i0].classList.add('hint-glow');if(all[i1])all[i1].classList.add('hint-glow');
    setTimeout(()=>{if(all[i0])all[i0].classList.remove('hint-glow');if(all[i1])all[i1].classList.remove('hint-glow');propCd=false;},1800);
}
function useShuffle(){
    if(propCd||!gameActive)return;if(shufN<=0){toast('洗牌不足');return;}
    propCd=true;shufN--;$('shuffleCnt').textContent=shufN;saveProgress();
    const ac=cards.filter(c=>!c.elim);ac.sort(()=>Math.random()-0.5);
    let si=0;cards.forEach((c,i)=>{if(!c.elim)cards[i]=ac[si++];});
    selIdx=null;render();setTimeout(()=>propCd=false,400);
}
function useBomb(){
    if(propCd||!gameActive)return;if(bombN<=0){toast('炸弹不足');return;}
    propCd=true;bombN--;$('bombCnt').textContent=bombN;saveProgress();
    const ac=cards.filter(c=>!c.elim);if(ac.length<2){toast('卡片少');propCd=false;return;}
    const pm=new Map();ac.forEach(c=>{if(!pm.has(c.pi))pm.set(c.pi,[]);pm.get(c.pi).push(c);});
    let tg=null;for(let v of pm.values()){if(v.length===2){tg=v;break;}}
    if(tg){tg[0].elim=tg[1].elim=true;}else ac[0].elim=true;
    selIdx=null;render();setTimeout(()=>propCd=false,400);
}
function shareSteps(){movesLeft+=3;$('movesVal').textContent=movesLeft;toast('📢 +3步');}
function nextRoom(){hideModal();currentRoomIdx++;currentStair=unlockedStairs[currentRoomIdx]||0;totalScore=0;updateTowerLocks();loadStair();}
function victory(){showModal('🏆 登顶物理学大厦！','总分:'+totalScore,'<button onclick="backToCover()">返回大厅</button>');}
function backToCover(){gameScreen.classList.add('hidden');coverScreen.classList.remove('hidden');hideModal();saveProgress();updateTowerLocks();}
function showModal(t,m,b){modalC.innerHTML=`<div class="modal"><div class="modal-box"><h3>${t}</h3><p>${m}</p><div>${b}</div></div></div>`;}
function hideModal(){modalC.innerHTML='';}
function toast(msg){toastC.innerHTML=`<div class="toast">${msg}</div>`;setTimeout(()=>toastC.innerHTML='',2000);}

// 启动
if(loadProgress()){loginScreen.classList.add('hidden');coverScreen.classList.remove('hidden');$('welcomeUser').textContent=playerName;updateTowerLocks();}
else{loginScreen.classList.remove('hidden');coverScreen.classList.add('hidden');gameScreen.classList.add('hidden');}
</script>
